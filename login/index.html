<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login • PBI</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="/">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-title">PBI</div>
          <div class="brand-sub">Purbeck Business Innovations</div>
        </div>
      </a>
      <div class="row">
        <a class="btn-ghost" href="/signup/">Create account</a>
      </div>
    </div>
  </nav>

  <main class="auth-shell">
    <div class="auth-card">
      <h2 class="section-title">Login</h2>
      <div id="message" class="notice" style="display:none;margin:16px 0"></div>

      <form id="loginForm">
        <div class="field">
          <label>Email address</label>
          <input class="input" type="email" name="email" required>
        </div>

        <div class="field">
          <label>Password</label>
          <input class="input" type="password" name="password" required>
        </div>

        <div class="cf-turnstile" data-sitekey="0x4AAAAAADBNXYq5lI5pxBLq"></div>

        <div class="row" style="margin-top:16px">
          <button class="btn" type="submit">Login</button>
          <a class="btn-ghost" href="/signup/">Create account</a>
        </div>
      </form>
    </div>
  </main>

  <script src="/assets/auth.js"></script>
  <script>
    PBIAuth.attachLogin('loginForm', 'message');
  </script>
</body>
</html>
