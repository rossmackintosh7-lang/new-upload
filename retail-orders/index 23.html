<!doctype html>
<html lang="en-GB">
<head>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <meta name="theme-color" content="#b95624">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Retail Orders • PBI</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="pbi-app-page">
  <div class="pbi-app-shell">
    <aside class="pbi-side"><a class="pbi-side-brand" href="/"><img src="/assets/PBI%20Logo.png" alt="PBI logo"></a><nav class="pbi-side-nav"><a class="pbi-side-link" href="/dashboard/"><span>⌂</span><strong>Dashboard</strong></a><a class="pbi-side-link" href="/builder/"><span>✦</span><strong>AI Builder</strong></a><a data-retail-orders-nav class="pbi-side-link active retail-orders-nav-item" href="/retail-orders/"><span>🛒</span><strong>Retail Orders</strong></a></nav><a class="pbi-side-collapse" href="/">‹‹ Home</a></aside>
    <main class="pbi-app-main"><header class="pbi-app-topbar"><div><h1>Retail Orders</h1><p>Paid product orders from your published retail templates.</p></div><a class="btn-ghost" href="/help/retail-stripe-setup/">Stripe setup guide</a></header><section class="pbi-app-content"><div class="card"><h2>Latest orders</h2><div id="ordersStatus" class="notice">Loading orders...</div><div id="ordersList"></div></div></section></main>
  </div>
<script>
function money(minor,currency){try{return new Intl.NumberFormat('en-GB',{style:'currency',currency:(currency||'gbp').toUpperCase()}).format((Number(minor||0)/100))}catch{return (currency||'gbp').toUpperCase()+' '+(Number(minor||0)/100).toFixed(2)}}
function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
async function loadOrders(){const status=document.getElementById('ordersStatus');const list=document.getElementById('ordersList');try{const res=await fetch('/api/retail/orders',{credentials:'include'});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||'Could not load orders.');const orders=data.orders||[];status.textContent=orders.length?`${orders.length} orders found.`:'No retail orders yet.';list.innerHTML=orders.map(o=>`<article class="seo-suggestion"><strong>${esc(o.project_name||o.site_slug||'Retail order')}</strong><p>Status: <b>${esc(o.status)}</b> • Total: <b>${money(o.total_minor,o.currency)}</b></p><p class="muted">Customer: ${esc(o.customer_name||'')} ${esc(o.customer_email||'')}</p><p class="muted">Created: ${esc(o.created_at||'')}</p><pre style="white-space:pre-wrap;background:#fff;padding:12px;border-radius:14px">${esc(o.items_json||'[]')}</pre></article>`).join('')}catch(e){status.textContent=e.message}}
loadOrders();
</script>
<script src="/assets/pbi-access.js" defer></script>
  <script src="/assets/pbi-retail-orders-visibility.js" defer></script>
  <script src="/assets/pbi-analytics.js" defer></script>
</body>
</html>
