<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard • PBI</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>

<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand brand-logo-only" href="/">
        <img src="/assets/PBI%20Logo.png" alt="Purbeck Business Solutions logo" class="header-logo">
      </a>

      <div class="row">
        <span id="userEmail" class="muted"></span>
        <button class="btn-ghost" id="logoutBtn" type="button">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container section">
    <div class="row-between" style="margin-bottom:28px">
      <div>
        <h1 class="section-title">Your websites</h1>
        <p class="muted">Create a new website, open an existing one, and keep building.</p>
      </div>

      <button class="btn" id="newProjectBtn" type="button">Create new project</button>
    </div>

    <div class="card">
      <h3>Projects</h3>
      <div id="projectList" class="project-list">
        <div class="notice">Loading your projects...</div>
      </div>
    </div>
  </main>

  <script src="/assets/dashboard.js"></script>
</body>
</html>
