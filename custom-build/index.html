<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Custom Build Enquiry • PBI</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <nav class="nav"><div class="container nav-inner"><a class="brand brand-logo-only" href="/"><img src="/assets/PBI%20Logo.png" alt="PBI logo" class="header-logo"></a><div class="row"><a class="btn-ghost" href="/signup/">Use Builder</a><a class="btn-ghost" href="/login/">Login</a></div></div></nav>
  <main class="container section">
    <div class="payment-hero"><p class="eyebrow">Custom build enquiry</p><h1 class="section-title">Tell us what you need built</h1><p class="hero-text">This form only appears for customers who choose the custom build route. It does not force a deposit. PBI reviews the scope first, then confirms the next step.</p></div>
    <div id="customBuildMessage" class="notice" style="display:none;margin-bottom:20px"></div>
    <section class="card custom-build-form-card" id="customBuildFormSection">
      <form id="customBuildForm" class="custom-build-form">
        <div class="grid-2"><div class="field"><label for="customBusinessName">Business name</label><input id="customBusinessName" name="business_name" class="input" required></div><div class="field"><label for="customContactName">Contact name</label><input id="customContactName" name="contact_name" class="input" required></div></div>
        <div class="grid-2"><div class="field"><label for="customEmail">Email address</label><input id="customEmail" name="email" type="email" class="input" required></div><div class="field"><label for="customPhone">Phone number</label><input id="customPhone" name="phone" class="input"></div></div>
        <div class="grid-2"><div class="field"><label for="customIndustry">Business type / industry</label><input id="customIndustry" name="industry" class="input" placeholder="Café, electrician, salon, consultant, shop..."></div><div class="field"><label for="customCurrentWebsite">Current website, if you have one</label><input id="customCurrentWebsite" name="current_website" class="input" placeholder="https://..."></div></div>
        <div class="field"><label for="mainPromotionGoal">What do you mainly want to promote?</label><select id="mainPromotionGoal" name="main_promotion_goal" class="select" required><option value="">Select one</option><option value="services">Services</option><option value="products">Products</option><option value="bookings">Bookings or enquiries</option><option value="physical_location">A physical shop, venue or location</option><option value="portfolio">Portfolio or examples of work</option><option value="events">Events or courses</option><option value="new_launch">A new business launch</option><option value="other">Something else</option></select></div>
        <div class="field"><label for="customProjectSummary">What would you like your website to do?</label><textarea id="customProjectSummary" name="project_summary" class="textarea" required placeholder="Tell us what you need, what the business does, and what customers should be able to do on the site."></textarea></div>
        <div class="field"><label for="customPages">Pages you think you need</label><textarea id="customPages" name="pages_needed" class="textarea" placeholder="Example: Home, About, Services, Gallery, Contact, Menu, Booking, FAQs..."></textarea></div>
        <div class="grid-2"><div class="field"><label for="customDomainStatus">Domain status</label><select id="customDomainStatus" name="domain_status" class="select"><option value="">Select one</option><option value="already_have_domain">I already have a domain</option><option value="need_new_domain">I need a new domain</option><option value="not_sure">I’m not sure</option></select></div><div class="field"><label for="customDomainName">Domain name, if known</label><input id="customDomainName" name="domain_name" class="input" placeholder="yourbusiness.co.uk"></div></div>
        <div class="grid-2"><div class="field"><label for="customLogoStatus">Do you need a logo?</label><select id="customLogoStatus" name="logo_status" class="select"><option value="">Select one</option><option value="have_logo">I already have a logo</option><option value="need_logo">I need a logo</option><option value="need_logo_refresh">I have a logo but want it improved</option><option value="not_sure">I’m not sure</option></select></div><div class="field"><label for="customBrandColours">Brand colours</label><input id="customBrandColours" name="brand_colours" class="input" placeholder="Example: dark green, cream, gold"></div></div>
        <div class="field"><label for="customLogoIdeas">Logo ideas / brand style</label><textarea id="customLogoIdeas" name="logo_ideas" class="textarea" placeholder="Tell us what you have in mind for the logo or brand style."></textarea></div>
        <div class="field"><label for="customLikedWebsites">Websites you like</label><textarea id="customLikedWebsites" name="liked_websites" class="textarea" placeholder="Paste links to websites you like and say what you like about them."></textarea></div>
        <div class="field"><label for="customDislikedWebsites">Websites you dislike</label><textarea id="customDislikedWebsites" name="disliked_websites" class="textarea" placeholder="Optional, but useful. Paste links or describe styles you want to avoid."></textarea></div>
        <div class="field"><label for="customFeatures">Features needed</label><textarea id="customFeatures" name="features_needed" class="textarea" placeholder="Booking, contact form, payments, menus, gallery, blog, ecommerce-style products, newsletter, members area, etc."></textarea></div>
        <div class="grid-2"><div class="field"><label for="customImagesStatus">Do you already have images?</label><select id="customImagesStatus" name="images_status" class="select"><option value="">Select one</option><option value="have_images">Yes, I have images</option><option value="need_images">No, I need help with images</option><option value="mixed">Some, but probably need more</option></select></div><div class="field"><label for="customWordingHelp">Do you need help with wording?</label><select id="customWordingHelp" name="wording_help" class="select"><option value="">Select one</option><option value="yes">Yes</option><option value="no">No</option><option value="some_help">Some help</option></select></div></div>
        <div class="grid-2"><div class="field"><label for="customDeadline">Ideal launch date</label><input id="customDeadline" name="deadline" class="input" placeholder="Example: within 4 weeks"></div><div class="field"><label for="customBudget">Estimated budget</label><select id="customBudget" name="budget" class="select"><option value="">Select one</option><option value="1500_2500">£1,500 – £2,500</option><option value="2500_3500">£2,500 – £3,500</option><option value="3500_plus">£3,500+</option><option value="not_sure">I’m not sure yet</option></select></div></div>
        <div class="field"><label for="customExtraNotes">Anything else?</label><textarea id="customExtraNotes" name="extra_notes" class="textarea" placeholder="Add anything else that would help us understand the project."></textarea></div>
        <div class="custom-form-actions"><button class="btn" type="submit" id="customBuildSubmitBtn">Submit Custom Build Request</button><a class="btn-ghost" href="/">Cancel</a></div>
      </form>
    </section>
  </main>
  <script src="/assets/custom-build.js"></script>
  <script src="/assets/currency.js"></script>
</body>
</html>
